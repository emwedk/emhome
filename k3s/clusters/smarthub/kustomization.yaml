apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: smarthub
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps/smarthub
  prune: true
  sourceRef:
    kind: GitRepository
    name: smarthub-repo
  targetNamespace: smarthub
  - ../../apps/smarthub/zigbee2mqtt
  timeout: 2m
