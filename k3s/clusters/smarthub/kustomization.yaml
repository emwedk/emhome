apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/smarthub
  prune: true
  sourceRef:
    kind: GitRepository
    name: smarthub-repo
  targetNamespace: smarthub
  - ../../apps/smarthub/zigbee2mqtt
  timeout: 2m
