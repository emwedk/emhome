apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  path: ./clusters/smarthub
  sourceRef:
    kind: GitRepository
    name: flux-system
  patches:
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: helm-controller
          namespace: flux-system
        spec:
          template:
            spec:
              containers:
              - name: manager
                image: ghcr.io/fluxcd/helm-controller:v0.38.0@sha256:7c3decbf15a50e850fa296b3c6b250cfd14bcd7a19859353c9e99186a2f7e186
      target:
        kind: Deployment
        name: helm-controller
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: kustomize-controller
          namespace: flux-system
        spec:
          template:
            spec:
              containers:
              - name: manager
                image: ghcr.io/fluxcd/kustomize-controller:v1.2.0@sha256:06cfb99fcdc6b6f0b50f2f97398b9bc3b7618de21ee72f5e0d2f8a64eec0c5be
      target:
        kind: Deployment
        name: kustomize-controller
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: notification-controller
          namespace: flux-system
        spec:
          template:
            spec:
              containers:
              - name: manager
                image: ghcr.io/fluxcd/notification-controller:v1.1.0@sha256:6e4872f2edb5118045e65f09b9f3dd1ce20e1e0d189d661e060ef3ce3e4ff45f
      target:
        kind: Deployment
        name: notification-controller
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: source-controller
          namespace: flux-system
        spec:
          template:
            spec:
              containers:
              - name: manager
                image: ghcr.io/fluxcd/source-controller:v1.2.0@sha256:6c0bc383ce5390e04c64a4d8ffadf5e410d7f9ebc8cb582a6612d290b14236be
      target:
        kind: Deployment
        name: source-controller
