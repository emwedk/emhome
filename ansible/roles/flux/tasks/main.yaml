- name: Get latest Flux release version from GitHub
  uri:
    url: https://api.github.com/repos/fluxcd/flux2/releases/latest
    return_content: yes
  register: flux_api

- name: Extract tag name from GitHub response
  set_fact:
    flux_version: "{{ flux_api.json.tag_name | regex_replace('^v', '') }}"
    flux_arch: "arm64"

- name: Check if Flux is already installed
  command: flux --version
  register: flux_check
  failed_when: false
  changed_when: false

- name: Download latest Flux release
  when: "'Flux version' not in flux_check.stdout"
  get_url:
    url: "https://github.com/fluxcd/flux2/releases/download/v{{ flux_version }}/flux_{{ flux_version }}_linux_{{ flux_arch }}.tar.gz"
    dest: "/tmp/flux.tar.gz"

- name: Ensure /tmp/flux-bin exists
  file:
    path: /tmp/flux-bin
    state: directory
    mode: '0755'

- name: Extract Flux binary
  when: "'Flux version' not in flux_check.stdout"
  unarchive:
    src: "/tmp/flux.tar.gz"
    dest: "/tmp/flux-bin"
    remote_src: yes

- name: Install Flux to /usr/local/bin
  when: "'Flux version' not in flux_check.stdout"
  copy:
    src: "/tmp/flux-bin/flux"
    dest: "/usr/local/bin/flux"
    mode: '0755'
    remote_src: yes

- name: Cleanup temp Flux files
  when: "'Flux version' not in flux_check.stdout"
  file:
    path: "{{ item }}"
    state: absent
    remote_src: yes
  loop:
    - "/tmp/flux.tar.gz"
    - "/tmp/flux-bin"

- name: Set Zigbee device path fact
  set_fact:
    zigbee_device_path: "{{ zigbee_device.stdout }}"


